name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_run:
    workflows: ["Refresh Substack Content"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pushed content
        if: github.event_name != 'workflow_run'
        uses: actions/checkout@v4

      - name: Checkout main after refresh
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
