name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Fetch Substack posts
        id: fetch_posts
        continue-on-error: true
        run: |
          echo "### Substack Fetch" >> "$GITHUB_STEP_SUMMARY"
          for ATTEMPT in 1 2 3 4; do
            HTTP_CODE=$(curl -s -o /tmp/substack_posts.json -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (compatible; PersonalSiteSync/1.0; +https://www.jameskull.com)" \
              "https://jameskull.substack.com/api/v1/posts?limit=50&offset=0")
            echo "- Attempt $ATTEMPT: HTTP \`$HTTP_CODE\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$HTTP_CODE" = "200" ]; then
              COUNT=$(python -c "import json; print(len(json.load(open('/tmp/substack_posts.json'))))" 2>/dev/null || echo "0")
              if [ "$COUNT" -gt 0 ] 2>/dev/null; then
                echo "- Result: **$COUNT posts fetched**" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
            sleep $(( ATTEMPT * 3 ))
          done
          echo "- Result: **API unreachable, using committed data**" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Sync Substack content
        run: |
          if [ -f /tmp/substack_posts.json ] && [ "${{ steps.fetch_posts.outcome }}" = "success" ]; then
            echo "Syncing from fresh API data..."
            python scripts/sync_substack_content.py --diagnostics --input-file /tmp/substack_posts.json
          else
            echo "::notice::Substack API unreachable from CI — deploying with committed content data."
            echo "Using committed data files (last synced locally)."
          fi

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
