name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Test Substack API access
        run: |
          echo "### Substack API Probe" >> "$GITHUB_STEP_SUMMARY"
          STATUS=$(curl -s -o /tmp/substack_probe.json -w "%{http_code}" \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (compatible; PersonalSiteSync/1.0)" \
            "https://jameskull.substack.com/api/v1/posts?limit=1" || true)
          CT=$(file -b --mime-type /tmp/substack_probe.json 2>/dev/null || echo "unknown")
          SIZE=$(wc -c < /tmp/substack_probe.json 2>/dev/null || echo "0")
          SNIPPET=$(head -c 300 /tmp/substack_probe.json 2>/dev/null || echo "empty")
          echo "- HTTP Status: \`$STATUS\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- MIME type: \`$CT\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Size: \`$SIZE bytes\`" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Response snippet</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "$SNIPPET" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Sync Substack content
        run: python scripts/sync_substack_content.py --diagnostics --retries 6 --timeout 30

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
