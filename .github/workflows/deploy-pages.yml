name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Fetch Substack posts
        run: |
          echo "### Substack Fetch" >> "$GITHUB_STEP_SUMMARY"
          for ATTEMPT in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /tmp/substack_posts.json -w "%{http_code}" \
              -H "Accept: application/json" \
              -H "User-Agent: Mozilla/5.0 (compatible; PersonalSiteSync/1.0; +https://www.jameskull.com)" \
              "https://jameskull.substack.com/api/v1/posts?limit=50&offset=0")
            echo "- Attempt $ATTEMPT: HTTP \`$HTTP_CODE\`" >> "$GITHUB_STEP_SUMMARY"
            if [ "$HTTP_CODE" = "200" ]; then
              COUNT=$(python -c "import json,sys; d=json.load(open('/tmp/substack_posts.json')); print(len(d))" 2>/dev/null || echo "parse_error")
              echo "- Posts: \`$COUNT\`" >> "$GITHUB_STEP_SUMMARY"
              if [ "$COUNT" != "parse_error" ] && [ "$COUNT" -gt 0 ] 2>/dev/null; then
                echo "- Status: **success**" >> "$GITHUB_STEP_SUMMARY"
                exit 0
              fi
            fi
            echo "  Waiting before retry..." >&2
            sleep $(( ATTEMPT * 3 ))
          done
          echo "- Status: **failed after 6 attempts**" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Last response</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -c 500 /tmp/substack_posts.json >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Sync Substack content
        run: python scripts/sync_substack_content.py --diagnostics --input-file /tmp/substack_posts.json

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
