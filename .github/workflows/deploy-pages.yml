name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Fetch Substack posts
        run: |
          curl -sf --retry 4 --retry-delay 3 --retry-all-errors \
            -H "Accept: application/json" \
            -H "User-Agent: Mozilla/5.0 (compatible; PersonalSiteSync/1.0; +https://www.jameskull.com)" \
            "https://jameskull.substack.com/api/v1/posts?limit=50&offset=0" \
            -o /tmp/substack_posts.json
          echo "### Substack Fetch" >> "$GITHUB_STEP_SUMMARY"
          echo "- Posts fetched: \`$(python -c "import json; print(len(json.load(open('/tmp/substack_posts.json'))))")\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Sync Substack content
        run: python scripts/sync_substack_content.py --diagnostics --input-file /tmp/substack_posts.json

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
