name: Refresh Substack And Deploy Pages

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LIVE_DATA_BASE_URLS: |
    https://www.jameskull.com
    https://jkull04.github.io/personal_site

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  refresh_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Install image tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Fetch baseline live data
        id: fetch_baseline
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import urllib.error
          import urllib.request

          base_urls = [line.strip().rstrip("/") for line in os.environ.get("LIVE_DATA_BASE_URLS", "").splitlines() if line.strip()]
          targets = [
              ("writings", "data/writings.json"),
              ("projects", "data/works-substack.json"),
          ]

          def fetch_from_base(base_url: str) -> dict[str, list[dict]]:
              fetched: dict[str, list[dict]] = {}
              for label, rel_path in targets:
                  url = f"{base_url}/{rel_path}"
                  req = urllib.request.Request(
                      url,
                      headers={
                          "Accept": "application/json",
                          "User-Agent": "Mozilla/5.0 (compatible; PersonalSiteSync/1.0; +https://www.jameskull.com)",
                      },
                  )
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      payload = json.loads(resp.read().decode("utf-8"))
                  if not isinstance(payload, list):
                      raise RuntimeError(f"Expected JSON array for {label} at {url}")
                  fetched[rel_path] = payload
              return fetched

          baseline_source = ""
          baseline_available = False
          for base_url in base_urls:
              try:
                  fetched = fetch_from_base(base_url)
                  for rel_path, payload in fetched.items():
                      path = pathlib.Path(rel_path)
                      path.parent.mkdir(parents=True, exist_ok=True)
                      path.write_text(json.dumps(payload, indent=2, ensure_ascii=False) + "\n", encoding="utf-8")
                  baseline_source = base_url
                  baseline_available = True
                  print(f"baseline_source={base_url}")
                  break
              except (urllib.error.URLError, urllib.error.HTTPError, RuntimeError, json.JSONDecodeError) as exc:
                  print(f"baseline_attempt_failed base={base_url!r} reason={exc}")

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"baseline_available={'true' if baseline_available else 'false'}\n")
              output.write(f"baseline_source={baseline_source}\n")
          PY

      - name: Sync Substack content
        id: sync_substack
        continue-on-error: true
        run: |
          python scripts/sync_substack_content.py \
            --diagnostics \
            --retries 6 \
            --timeout 30 \
            --source-order feed-web,posts,archive \
            --min-public-posts 1 \
            --merge-baseline

      - name: Decide final data source
        run: |
          set -euo pipefail

          SYNC_OUTCOME="${{ steps.sync_substack.outcome }}"
          BASELINE_AVAILABLE="${{ steps.fetch_baseline.outputs.baseline_available }}"
          BASELINE_SOURCE="${{ steps.fetch_baseline.outputs.baseline_source }}"
          RESULT_MODE="authoritative"

          if [ "$SYNC_OUTCOME" = "success" ]; then
            RESULT_MODE="authoritative"
          elif [ "$BASELINE_AVAILABLE" = "true" ]; then
            RESULT_MODE="baseline_fallback"
            echo "::warning::Fresh Substack sync failed; deploying seeded baseline live data."
          else
            echo "::error::Substack sync failed and no valid baseline data was available."
            exit 1
          fi

          WRITINGS_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          path = Path("data/writings.json")
          if not path.exists():
              print(0)
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              print(len(payload) if isinstance(payload, list) else 0)
          PY
          )

          PROJECTS_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          path = Path("data/works-substack.json")
          if not path.exists():
              print(0)
          else:
              payload = json.loads(path.read_text(encoding="utf-8"))
              print(len(payload) if isinstance(payload, list) else 0)
          PY
          )

          {
            echo "### Refresh Decision"
            echo ""
            echo "- Sync step outcome: \`$SYNC_OUTCOME\`"
            echo "- Baseline available: \`$BASELINE_AVAILABLE\`"
            echo "- Baseline source: \`${BASELINE_SOURCE:-n/a}\`"
            echo "- Result mode: \`$RESULT_MODE\`"
            echo "- Writings records: \`$WRITINGS_COUNT\`"
            echo "- Project records: \`$PROJECTS_COUNT\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate optimized runtime assets
        run: python scripts/optimize_runtime_images.py --check

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
