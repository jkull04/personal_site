name: Refresh Substack Content

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "substack-refresh"
  cancel-in-progress: true

jobs:
  refresh_content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Sync Substack content
        run: |
          python scripts/sync_substack_content.py \
            --diagnostics \
            --retries 6 \
            --timeout 30 \
            --source-order posts,feed-web,archive \
            --min-public-posts 1 \
            --merge-baseline

      - name: Detect content changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data/writings.json data/works-substack.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Substack Refresh"
              echo ""
              echo "- Result: \`No content changes\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Substack Refresh"
              echo ""
              echo "- Result: \`Content updated\`"
              echo "- Changed files:"
              git diff --name-only -- data/writings.json data/works-substack.json | sed 's/^/  - /'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed content
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/writings.json data/works-substack.json
          git commit -m "chore: refresh Substack content"
          git push
