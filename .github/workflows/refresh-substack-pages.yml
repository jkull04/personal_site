name: Refresh Substack Content

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [substack-post-preload]

permissions:
  contents: write

concurrency:
  group: "substack-refresh"
  cancel-in-progress: true

jobs:
  refresh_content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Apply bridge payload
        if: github.event_name == 'repository_dispatch'
        run: python scripts/apply_substack_bridge_payload.py --event-path "$GITHUB_EVENT_PATH"

      - name: Sync Substack content
        if: github.event_name != 'repository_dispatch'
        id: sync_primary
        continue-on-error: true
        run: |
          python scripts/sync_substack_content.py \
            --diagnostics \
            --retries 6 \
            --timeout 30 \
            --source-order posts,feed-web,archive \
            --min-public-posts 1 \
            --merge-baseline

      - name: Wait before retry
        if: github.event_name != 'repository_dispatch' && steps.sync_primary.outcome == 'failure'
        shell: bash
        run: sleep 180

      - name: Retry Substack sync
        id: sync_retry
        if: github.event_name != 'repository_dispatch' && steps.sync_primary.outcome == 'failure'
        continue-on-error: true
        run: |
          python scripts/sync_substack_content.py \
            --diagnostics \
            --retries 6 \
            --timeout 30 \
            --source-order posts,feed-web,archive \
            --min-public-posts 1 \
            --merge-baseline

      - name: Finalize sync outcome
        if: github.event_name != 'repository_dispatch'
        shell: bash
        run: |
          set -euo pipefail

          PRIMARY_OUTCOME="${{ steps.sync_primary.outcome }}"
          RETRY_OUTCOME="${{ steps.sync_retry.outcome }}"

          if [ -z "$RETRY_OUTCOME" ]; then
            RETRY_OUTCOME="skipped"
          fi

          if [ "$PRIMARY_OUTCOME" = "success" ] || [ "$RETRY_OUTCOME" = "success" ]; then
            {
              echo "### Sync Outcome"
              echo ""
              echo "- Primary attempt: \`$PRIMARY_OUTCOME\`"
              echo "- Retry attempt: \`$RETRY_OUTCOME\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # All sources failed (typically Cloudflare blocking CI runner IPs).
          # Emit a warning rather than failing the job so GitHub does not send
          # failure notification emails. Data files are left unchanged.
          echo "::warning::Substack refresh failed (likely Cloudflare blocking CI IPs); existing site content preserved. Use scripts/local_substack_push.py to update manually."
          {
            echo "### Sync Outcome"
            echo ""
            echo "- Primary attempt: \`$PRIMARY_OUTCOME\`"
            echo "- Retry attempt: \`$RETRY_OUTCOME\`"
            echo "- Result: \`No data changed; existing site content preserved\`"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Detect content changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- data/writings.json data/works-substack.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Substack Refresh"
              echo ""
              echo "- Result: \`No content changes\`"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "### Substack Refresh"
              echo ""
              echo "- Result: \`Content updated\`"
              echo "- Changed files:"
              git diff --name-only -- data/writings.json data/works-substack.json | sed 's/^/  - /'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit refreshed content
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/writings.json data/works-substack.json
          git commit -m "chore: refresh Substack content"
          git push
