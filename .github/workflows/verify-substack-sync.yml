name: Verify Substack Sync

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python runtime
        run: python --version

      - name: Verify Substack sync with diagnostics
        run: |
          python scripts/sync_substack_content.py \
            --diagnostics \
            --retries 6 \
            --timeout 30 \
            --source-order posts,archive \
            --min-public-posts 1
